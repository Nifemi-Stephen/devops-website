apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: application
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Nifemi-Stephen/devops-website.git/argoCD-GitOps-files
    targetRevision: main
    path: application

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
